# Dependabot configuration for googlecloudplatform/buildpacks
version: 2
updates:
  # Go modules: Ignore updates for root go.mod
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
    ignore:
      - dependency-name: "*"

  # Go modules: Scan all nested subdirectories except root
  - package-ecosystem: "gomod"
    directories:
      - "/*"
      - "/*/**"
    schedule:
      interval: "weekly"

  # Node.js (npm / yarn / pnpm)
  - package-ecosystem: "npm"
    directories:
      - "/**"
    schedule:
      interval: "weekly"

  # Python (pip)
  - package-ecosystem: "pip"
    directories:
      - "/**"
    schedule:
      interval: "weekly"

  # PHP (composer)
  - package-ecosystem: "composer"
    directories:
      - "/**"
    schedule:
      interval: "weekly"

  # Ruby (bundler)
  - package-ecosystem: "bundler"
    directories:
      - "/**"
    schedule:
      interval: "weekly"

  # .NET / C# (nuget)
  - package-ecosystem: "nuget"
    directories:
      - "/**"
    schedule:
      interval: "weekly"

  # Dockerfiles
  - package-ecosystem: "docker"
    directories:
      - "/**"
    schedule:
      interval: "weekly"

  # GitHub Actions workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
